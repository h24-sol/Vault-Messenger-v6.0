<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vault Messenger v6.0 | Total Privacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; --bg: #020617; }
        body { background: radial-gradient(circle at top right, #083344, #020617, #000000); font-family: 'Outfit', sans-serif; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .neo-input { background: rgba(2, 6, 23, 0.9); border: 1px solid #1e293b; color: white; }
        .app-name { background: linear-gradient(to bottom, #ffffff, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .privacy-blur { filter: blur(30px); pointer-events: none; transition: filter 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="appContainer" class="w-full max-w-lg glass rounded-[3rem] p-8 relative overflow-hidden">
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-20 h-20 bg-cyan-500/10 rounded-3xl flex items-center justify-center mb-4 border border-cyan-500/20 shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="app-name text-4xl font-black italic tracking-tighter">VAULT MESSENGER</h1>
            <p class="text-[9px] tracking-[0.5em] text-slate-500 font-bold uppercase">v6.0 Quantum Architecture</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900/80 p-3 rounded-2xl border border-slate-800">
                <label class="text-[8px] text-cyan-500 font-black uppercase block mb-1">Shift Key</label>
                <input type="password" id="vaultKey" value="12" class="bg-transparent w-full font-bold text-lg text-white outline-none">
            </div>
            <button onclick="toggleStealth()" id="stealthBtn" class="bg-slate-900/80 p-3 rounded-2xl border border-slate-800 transition-all hover:border-cyan-500/50">
                <label class="text-[8px] text-slate-500 font-black uppercase block mb-1">Stealth</label>
                <span id="stealthStat" class="text-[10px] font-black text-slate-400">OFF</span>
            </button>
        </div>

        <div class="flex gap-2 mb-4">
            <label class="flex-1 bg-cyan-500/10 border border-cyan-500/20 p-4 rounded-2xl text-center cursor-pointer active:scale-95 transition-all">
                <span id="fileLabel" class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">📎 Attach Image</span>
                <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleImg(this)">
            </label>
            <button onclick="clearImg()" class="bg-red-500/10 text-red-500 p-4 rounded-2xl border border-red-500/20 font-black">✕</button>
        </div>

        <div id="imgPreview" class="hidden mb-4 rounded-2xl overflow-hidden border border-cyan-500/20">
            <img id="preview" src="" class="w-full">
        </div>

        <textarea id="msgInput" placeholder="Enter message or paste encrypted data..." class="w-full neo-input rounded-[2rem] p-6 h-36 outline-none text-sm mb-6 resize-none"></textarea>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="run('enc')" class="bg-cyan-500 text-black font-black py-5 rounded-2xl shadow-xl shadow-cyan-500/20 active:scale-95 transition-all">ENCRYPT & SEND</button>
            <button onclick="run('dec')" class="bg-slate-800 text-white font-black py-5 rounded-2xl border border-slate-700 active:scale-95 transition-all">DECRYPT</button>
        </div>

        <div id="resArea" class="hidden animate-pulse">
            <div class="bg-cyan-500/5 border border-cyan-500/20 rounded-[2rem] p-6 relative">
                <div class="flex justify-between items-center mb-4">
                    <span id="resLabel" class="text-[10px] font-bold text-cyan-400 tracking-widest uppercase">Vault Output</span>
                    <button onclick="copyIt()" class="text-[10px] bg-white text-black px-4 py-1.5 rounded-full font-black">COPY</button>
                </div>
                <div id="resText" class="text-sm font-medium text-white break-all leading-relaxed"></div>
                <div class="mt-6 h-[2px] bg-slate-800 rounded-full overflow-hidden">
                    <div id="timer" class="h-full bg-cyan-400 w-full transition-all ease-linear"></div>
                </div>
            </div>
        </div>

        <footer class="mt-12 pt-8 border-t border-slate-900 flex flex-col items-center opacity-40">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Developer</p>
            <a href="mailto:manis.programmer@gmail.com" class="text-cyan-600 font-black">manis.programmer@gmail.com</a>
        </footer>
    </div>

    <script>
        let currentImgBase64 = "";
        let burnCountdown;

        function handleImg(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImgBase64 = e.target.result;
                document.getElementById('preview').src = currentImgBase64;
                document.getElementById('imgPreview').classList.remove('hidden');
                document.getElementById('fileLabel').innerText = "✅ Image Loaded";
            };
            reader.readAsDataURL(file);
        }

        function clearImg() {
            currentImgBase64 = "";
            document.getElementById('imgInput').value = "";
            document.getElementById('imgPreview').classList.add('hidden');
            document.getElementById('fileLabel').innerText = "📎 Attach Image";
        }

        function toggleStealth() {
            const input = document.getElementById('msgInput');
            const stat = document.getElementById('stealthStat');
            const active = stat.innerText === "OFF";
            stat.innerText = active ? "ACTIVE" : "OFF";
            stat.className = active ? "text-[10px] font-black text-cyan-400" : "text-[10px] font-black text-slate-400";
            input.style.webkitTextSecurity = active ? "disc" : "none";
        }

        function run(mode) {
            const input = document.getElementById('msgInput');
            const key = document.getElementById('vaultKey').value;
            const resArea = document.getElementById('resArea');
            const resText = document.getElementById('resText');
            const bar = document.getElementById('timer');

            // Decoy Vault Trigger
            if (key === "000") {
                resText.innerText = "Weather: Sunny. Village: Active. News: No alerts.";
                resArea.classList.remove('hidden');
                return;
            }

            let shift = parseInt(key) || 0;
            if(mode === 'dec') shift = -shift;

            let source = currentImgBase64 || input.value;
            if(!source) return;

            const result = source.split('').map(c => String.fromCharCode(c.charCodeAt(0) + shift)).join('');
            
            if (mode === 'dec' && result.startsWith('data:image')) {
                resText.innerHTML = `<img src="${result}" class="rounded-xl w-full border border-cyan-500/50 shadow-2xl">`;
            } else {
                resText.innerText = result;
            }

            resArea.classList.remove('hidden');
            
            // Self-Destruct Logic (30s)
            clearTimeout(burnCountdown);
            bar.style.transition = 'none';
            bar.style.width = '100%';
            setTimeout(() => {
                bar.style.transition = 'width 30s linear';
                bar.style.width = '0%';
            }, 50);
            burnCountdown = setTimeout(() => {
                resArea.classList.add('hidden');
                resText.innerText = "";
                input.value = "";
                clearImg();
            }, 30000);
        }

        function copyIt() {
            const text = document.getElementById('resText').innerText;
            navigator.clipboard.writeText(text);
        }

        window.onblur = () => document.getElementById('appContainer').classList.add('privacy-blur');
        window.onfocus = () => document.getElementById('appContainer').classList.remove('privacy-blur');
    </script>
</body>
</html>
