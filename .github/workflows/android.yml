name: Build Vault v6 APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6 # Upgraded to v6 for Node 24 support

      - name: Setup Node.js
        uses: actions/setup-node@v6 # Upgraded to v6 for Node 24 support
        with:
          node-version: 24

      - name: Install & Force Build
        run: |
          npm install
          npm run build
          # This creates the android folder only if it doesn't exist
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v6 # Upgraded to v6 for Node 24 support
        with:
          name: Vault-Messenger-V6-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
